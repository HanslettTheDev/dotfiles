# Key bindings
unbind C-b
set-option -g prefix C-a
set -g mouse on # set scroll option

# Using full terminal colors
set-option -a terminal-features "xterm-256color:RGB"
# My tmux plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# auto reload my tmux sessions
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto restore 
set -g @continuum-restore 'on'
# Auto save interval
set -g @continuum-save-interval 10  
# Restore neovim state
set -g @resurrect-strategy-nvim 'session'

# Special plugin for cyberdream theme
# set -g @catppuccin_flavour "cyberdream"
# run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# set -ogq u/catppuccin_window_text " #W"
# set -ogq u/catppuccin_window_current_text " #W"

run '~/.tmux/plugins/tpm/tpm'

