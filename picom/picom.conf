backend = "glx";            # Rendering backend: "xrender", "glx", "xr_glx_hybrid"
# Disable shadows on specific window types
shadow-exclude = [
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'",
    "window_type = 'utility'",
    "window_type = 'tooltip'",
    "class_i *?= 'slop'"
];

# Opacity rules
opacity-rule = [
    "90:class_g = 'URxvt' && focused",
    "60:(class_g = 'URxvt' || class_g = 'Alacritty') && !focused"
];

blur-method = "kawase";    # "none", "kawase", "dual_kawase", "box"
blur-size = 8;
blur-deviation = 5.0;
blur-strength = 5;
blur-exclude = [
    "class_g = 'firefox'",
    "class_g = 'chrome'",
    "window_type = 'dock'"
];
blur-background-exclude = [
    "class_i = 'slop'",
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'",
    "window_type = 'utility'",
    "window_type = 'tooltip'"
];
