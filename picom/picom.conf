# Disable shadows on specific window types
shadow-exclude = [
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'",
    "window_type = 'utility'"
];

# Opacity rules
opacity-rule = [
    "90:class_g = 'URxvt' && focused",
    "60:(class_g = 'URxvt' || class_g = 'Alacritty') && !focused"
];

blur: {
  method = "kawase";
  strength = 9;
  background = false;
  background-frame = false;
  background-fixed = false;
}
